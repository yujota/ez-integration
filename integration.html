<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Extension...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f8f9fa; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1557b0; }
        p { color: #5f6368; line-height: 1.5; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Ready to open your file?</h2>
        <p>Google Drive sent the file details. Click below to view the file in your Chrome Extension.</p>
        <button id="openBtn">Open in Extension</button>
    </div>

    <script>
        const EXTENSION_ID = "locbnibbgabdeleihmocpfgjgjnofede";
        const TARGET_PAGE = "open_handler.html";
        const queryString = window.location.search; // Contains ?state=...
        console.log("query", queryString);

        document.getElementById('openBtn').addEventListener('click', () => {
            const queryString = window.location.search; // Contains ?state=...
            console.log("query", queryString);
            
            if (queryString && queryString.includes("state=")) {
                const targetUrl = `chrome-extension://${EXTENSION_ID}/${TARGET_PAGE}${queryString}`;
                console.log("targetURL", targetUrl);
                window.location.href = targetUrl;
            } else {
                alert("No Google Drive data found in the URL.");
            }
        });
    </script>
</body>
</html>
